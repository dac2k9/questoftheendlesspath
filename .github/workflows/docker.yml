name: Build and Push Docker Image

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trigger Render to pull the freshly-pushed :latest image. Render's
      # service is "Image" type which doesn't poll GHCR for changes, so
      # we kick its deploy hook ourselves the moment the image is up.
      # Configure RENDER_DEPLOY_HOOK in repo Settings → Secrets:
      # Render Dashboard → service → Settings → "Deploy Hook" → copy URL.
      #
      # `secrets` context isn't usable in step-level `if:` directly, so
      # we assign to an env var and check that in shell.
      - name: Trigger Render deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK_URL" ]; then
            curl -fsS -X POST "$HOOK_URL"
            echo "Render deploy triggered"
          else
            echo "RENDER_DEPLOY_HOOK not set — manual deploy required"
          fi
