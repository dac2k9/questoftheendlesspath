# Asset generation manifest — drives `tools/pixellab_gen.py`.
#
# Each entry generates one PNG (or, for 4-direction characters, one
# sheet or set of direction PNGs depending on the API response).
# Already-generated outputs are skipped unless `--force` is passed,
# so re-running the script is safe — only missing assets cost credits.
#
# Type → endpoint mapping (see tools/pixellab_gen.py):
#   character_4dir → /create-character-with-4-directions
#   image          → /generate-image-v2
#   object         → /generate-image-v2 (with transparent-background phrasing)
#   tileset        → /tilesets

adventure: sample-fantasy

defaults:
  # All `out` paths are joined onto this root. Generated assets land
  # in `assets/generated/` so they don't mix with hand-authored ones
  # we want to preserve under source control.
  out_root: crates/gameclient/assets/generated

assets:
  # ── Monsters (4-direction sprites with walk cycles) ─────
  - id: bog_wraith
    type: character_4dir
    description: "ghostly pale-green swamp wraith, fantasy pixel art"
    size: 64
    out: monsters/BogWraith.png

  - id: stone_golem
    type: character_4dir
    description: "small stone golem with mossy patches, fantasy pixel art"
    size: 64
    out: monsters/StoneGolem.png

  # ── POI illustrations (top-down landmark views) ─────────
  - id: poi_workshop
    type: image
    description: "small fantasy workshop with anvil and forge, top-down view, pixel art"
    size: [48, 48]
    out: poi/workshop.png

  - id: poi_apothecary
    type: image
    description: "tiny fantasy apothecary cottage with green roof and herb garden, top-down view, pixel art"
    size: [48, 48]
    out: poi/apothecary.png

  # ── Chests ──────────────────────────────────────────────
  - id: chest_silver
    type: object
    description: "silver-bound treasure chest, closed, fantasy, transparent background, pixel art"
    size: [32, 32]
    out: objects/chest_silver.png

  - id: chest_gold
    type: object
    description: "ornate gold treasure chest, closed, fantasy, transparent background, pixel art"
    size: [32, 32]
    out: objects/chest_gold.png

  # ── Gear icons (transparent-background single sprites) ──
  - id: gear_warhammer
    type: object
    description: "fantasy warhammer weapon item icon, transparent background, pixel art"
    size: [32, 32]
    out: gear/warhammer.png

  - id: gear_emerald_amulet
    type: object
    description: "emerald amulet pendant on transparent background, fantasy pixel art"
    size: [32, 32]
    out: gear/emerald_amulet.png

  # ── Biome tile sample (one or two only — sampling) ──────
  - id: tile_marsh
    type: tileset
    # /tilesets is Wang-style: upper_description is the patch we're
    # painting in, lower_description is the surrounding terrain it
    # blends into.
    upper_description: "marshy swamp ground with reeds and dark water, fantasy"
    lower_description: "lush grass, fantasy"
    tile_size: 16
    out: tiles/marsh.png

  # ── Boon icons (HUD chip sprites, 32×32 with transparent bg) ──
  # Each one renders inside a 20×20 chip on the top-left strip.
  # Description style: "<concrete object> icon, fantasy pixel art,
  # transparent background" — keeps the look consistent across the set.
  - id: boon_swift_boots
    type: object
    description: "small winged leather boot icon, fantasy pixel art, transparent background"
    size: [32, 32]
    out: boons/swift_boots.png

  - id: boon_trailblazer
    type: object
    description: "footprints leading into grass icon, fantasy pixel art, transparent background"
    size: [32, 32]
    out: boons/trailblazer.png

  - id: boon_roadwise
    type: object
    description: "rolled scroll-map with red road line icon, fantasy pixel art, transparent background"
    size: [32, 32]
    out: boons/roadwise.png

  - id: boon_sprint
    type: object
    description: "lightning bolt icon, fantasy pixel art, transparent background"
    size: [32, 32]
    out: boons/sprint.png

  - id: boon_goldfinger
    type: object
    description: "gloved hand grasping gold coins icon, fantasy pixel art, transparent background"
    size: [32, 32]
    out: boons/goldfinger.png

  - id: boon_wealthy_start
    type: object
    description: "bulging coin pouch icon, fantasy pixel art, transparent background"
    size: [32, 32]
    out: boons/wealthy_start.png

  - id: boon_treasure_sense
    type: object
    description: "glowing eye over treasure chest icon, fantasy pixel art, transparent background"
    size: [32, 32]
    out: boons/treasure_sense.png

  - id: boon_forge_discount
    type: object
    description: "blacksmith hammer striking anvil with sparks icon, fantasy pixel art, transparent background"
    size: [32, 32]
    out: boons/forge_discount.png

  - id: boon_cartographer
    type: object
    description: "brass compass over folded map corner icon, fantasy pixel art, transparent background"
    size: [32, 32]
    out: boons/cartographer.png

  # ── Buff icons (HUD chip sprites for temporary potion buffs) ──
  # Same 32×32 transparent format as boons. The buff's source_item
  # id is the lookup key, so the file under buffs/ must match
  # (e.g. speed_potion → buffs/speed_potion.png).
  - id: buff_speed_potion
    type: object
    description: "small glass potion bottle with swirling glowing green liquid, fantasy pixel art, transparent background"
    size: [32, 32]
    out: buffs/speed_potion.png

  # ═══════════════════════════════════════════════════════════════
  # CHAOS UNLEASHED adventure — POIs, monsters, boss portraits.
  # The 4 castles each carry a distinct elemental theme so the player
  # reads the dungeon's flavor before they even enter.
  # ═══════════════════════════════════════════════════════════════

  # ── Boss castles (top-down POI illustrations, 48×48) ───
  - id: poi_castle_frost
    type: image
    description: "ice-spire castle with frozen battlements and blue-white snow, top-down fantasy pixel art"
    size: [48, 48]
    out: poi/castle_frost.png

  - id: poi_castle_flame
    type: image
    description: "basalt castle with lava cracks and ember glow, dark stone, top-down fantasy pixel art"
    size: [48, 48]
    out: poi/castle_flame.png

  - id: poi_castle_shadow
    type: image
    description: "twisted black-stone castle with thorny spires and purple void mist, top-down fantasy pixel art"
    size: [48, 48]
    out: poi/castle_shadow.png

  - id: poi_castle_storm
    type: image
    description: "windswept castle on high cliffs with dark storm clouds and lightning, top-down fantasy pixel art"
    size: [48, 48]
    out: poi/castle_storm.png

  # ── Travel-gate POI (reused at every gate location) ───
  - id: poi_travel_gate
    type: image
    description: "stone archway portal with glowing blue rune-stones, top-down fantasy pixel art"
    size: [48, 48]
    out: poi/travel_gate.png

  # ── Refugee camp + Wizard's spire (sub-quest hubs) ────
  - id: poi_refugee_camp
    type: image
    description: "small tents around a cooking fire with a broken cart, top-down fantasy pixel art"
    size: [48, 48]
    out: poi/refugee_camp.png

  - id: poi_wizards_spire
    type: image
    description: "single tall ruined wizard tower with cracked window and weather-worn stone, top-down fantasy pixel art"
    size: [48, 48]
    out: poi/wizards_spire.png

  # ── Chaos monster sprites (character_4dir, 16×16 atlas) ───
  - id: chaos_corrupted_knight
    type: character_4dir
    description: "corrupted knight in tarnished armor with glowing purple eyes, fantasy pixel art"
    size: 64
    out: monsters/CorruptedKnight.png

  - id: chaos_void_imp
    type: character_4dir
    description: "small purple void imp with glowing eyes and tattered wings, fantasy pixel art"
    size: 64
    out: monsters/VoidImp.png

  - id: chaos_road_bandit
    type: character_4dir
    description: "ragged road bandit with leather hood and curved dagger, fantasy pixel art"
    size: 64
    out: monsters/RoadBandit.png

  # ── Boss portraits (large single images for combat header) ──
  - id: boss_portrait_frost
    type: image
    description: "intimidating frost queen portrait, icy crown and glowing blue eyes, fantasy pixel art"
    size: [96, 96]
    out: portraits/boss_frost.png

  - id: boss_portrait_flame
    type: image
    description: "intimidating flame lord portrait, molten crown and burning eyes, fantasy pixel art"
    size: [96, 96]
    out: portraits/boss_flame.png

  - id: boss_portrait_shadow
    type: image
    description: "intimidating shadow lich portrait, hooded skull and purple flame eyes, fantasy pixel art"
    size: [96, 96]
    out: portraits/boss_shadow.png

  - id: boss_portrait_storm
    type: image
    description: "intimidating storm tyrant portrait, lightning crown and steel-grey eyes, fantasy pixel art"
    size: [96, 96]
    out: portraits/boss_storm.png

  # ── Chaos worldbuilding entities (Phase 2 — fill the 200×160 map) ──
  # 4-dir character sprites for the new mobile entities that get
  # spread across all 4 quadrants of the chaos world. Each set is
  # 4 PNGs (north/south/east/west) under monsters/. Combat-style:
  # entities use these for the patrol/wander loops; on-contact
  # behavior decided per-entity in seed99999_entities.json.
  - id: chaos_refugee
    type: character_4dir
    description: "ragged human refugee in a brown cloak with a walking staff, civilian, fantasy pixel art"
    size: 64
    out: monsters/Refugee.png

  - id: chaos_shadow_stalker
    type: character_4dir
    description: "dark wraith with tattered black robes and glowing violet eye-slits, ghostly forest hunter, fantasy pixel art"
    size: 64
    out: monsters/ShadowStalker.png

  - id: chaos_flame_imp
    type: character_4dir
    description: "small red flame imp wreathed in orange fire, sharp horns and burning eyes, fantasy pixel art"
    size: 64
    out: monsters/FlameImp.png

  - id: chaos_wolf
    type: character_4dir
    description: "corrupted dire wolf with matted black fur and glowing purple eyes, fantasy pixel art"
    size: 64
